{% extends 'base.html' %}

{% block title %}利用できない機能{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <h1 class="h4 mb-3">
                        <i class="fas fa-lock text-warning"></i> 利用できない機能です
                    </h1>
                    <p class="text-muted mb-4">
                        この機能は、利用権限が付与されたアカウントのみ利用できます。
                    </p>
                    <p class="mb-4">
                        利用が必要な場合は、管理者に権限の確認を依頼してください。
                    </p>
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                        <a class="btn btn-primary" href="{% url 'dashboard' %}">
                            <i class="fas fa-tachometer-alt"></i> ダッシュボードへ
                        </a>
                        <a class="btn btn-outline-secondary" href="{% url 'profile_edit' %}">
                            <i class="fas fa-user-edit"></i> プロフィール
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
