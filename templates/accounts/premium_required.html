{% extends 'base.html' %}

{% block title %}プレミアム機能{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <h1 class="h4 mb-3">
                        <i class="fas fa-lock text-warning"></i> 利用できない機能です
                    </h1>
                    <p class="text-muted mb-4">
                        この機能は、プレミアム権限が付与されたアカウントのみ利用できます。
                    </p>
                    <p class="mb-4">
                        月額プレミアムの申し込み、運営発行コードの入力、支払い方法変更、解約はプレミアム管理から行えます。
                    </p>
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                        <a class="btn btn-primary" href="{% url 'billing' %}">
                            <i class="fas fa-crown"></i> プレミアム管理へ
                        </a>
                        <a class="btn btn-outline-primary" href="{% url 'premium_features' %}">
                            <i class="fas fa-list-check"></i> 機能差分を見る
                        </a>
                        <a class="btn btn-outline-secondary" href="{% url 'commercial_disclosure' %}">
                            <i class="fas fa-file-contract"></i> 料金・解約条件
                        </a>
                        <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">
                            <i class="fas fa-tachometer-alt"></i> ダッシュボードへ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
